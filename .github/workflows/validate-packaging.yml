name: Validate packaging

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    container:
      image: archlinux@sha256:32c78c548c1a3f9db43bc25fb9f47d8bf5efff49a1da3810bb60790b4202d657
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm base-devel git curl unzip

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          persist-credentials: false

      - name: Check AUR pkgver vs GitHub releases/latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export PATH="${HOME}/.bun/bin:${PATH}"
          cd "${GITHUB_WORKSPACE}" && bun run check-aur-vs-latest

      - name: Non-root user for makepkg
        run: |
          if ! id builder >/dev/null 2>&1; then
            useradd -m -s /bin/bash builder
          fi
          chown -R builder:builder "${GITHUB_WORKSPACE}"

      - name: Verify PKGBUILD sources
        run: |
          export PATH="${HOME}/.bun/bin:${PATH}"
          runuser -u builder -- env HOME="${HOME}" PATH="${PATH}" \
            bash -lc "cd \"${GITHUB_WORKSPACE}\" && bun run verify-packaging"

      # Run as root (not builder): GITHUB_STEP_SUMMARY is only writable by the runner user.
      - name: Audit AUR vs upstream (job summary)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export PATH="${HOME}/.bun/bin:${PATH}"
          cd "${GITHUB_WORKSPACE}" && bun run audit-upstream
