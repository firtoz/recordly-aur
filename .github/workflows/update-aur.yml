name: Update AUR

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      push:
        description: "Push to AUR (default: dry run only)"
        required: false
        default: false
        type: boolean

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    env:
      # Cron = really push; manual run = dry run unless "push" is checked
      PUSH_TO_AUR: ${{ github.event_name == 'schedule' || github.event.inputs.push == 'true' }}
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel git curl jq

      - name: Checkout helper repo
        uses: actions/checkout@v4

      - name: Set up AUR SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "$AUR_SSH_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          printf 'Host aur.archlinux.org\n  IdentityFile ~/.ssh/aur_key\n  StrictHostKeyChecking no\n' > ~/.ssh/config
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}

      - name: Run update script
        run: |
          if [ "${{ env.PUSH_TO_AUR }}" = "true" ]; then
            ./update-aur.sh
          else
            echo "Dry run (set workflow input push=true to push to AUR)"
            DRY_RUN=1 ./update-aur.sh
          fi
