name: Update AUR

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      push:
        description: "Push to AUR (default: dry run only)"
        required: false
        default: false
        type: boolean
      force:
        description: "Force checksum refresh / pkgrel bump even if pkgver is unchanged"
        required: false
        default: false
        type: boolean

# Forks: skip scheduled/manual runs (no secrets, avoids failed cron noise). Change the repo literal if you rename.
permissions:
  contents: read

jobs:
  update:
    if: github.repository == 'firtoz/recordly-aur'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    env:
      # Cron = really push; manual run = dry run unless "push" is checked
      PUSH_TO_AUR: ${{ github.event_name == 'schedule' || github.event.inputs.push == 'true' }}
    steps:
      - name: Install dependencies
        # openssh: required for git clone ssh://aur@… (git lists it as optional on Arch)
        run: pacman -Syu --noconfirm base-devel git curl openssh unzip

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Checkout helper repo
        uses: actions/checkout@v4

      - name: Validate AUR SSH key (push runs only)
        if: env.PUSH_TO_AUR == 'true'
        run: |
          if [ -z "${AUR_SSH_KEY}" ]; then
            echo "::error::Secret AUR_SSH_KEY is empty. Add the private key used on the AUR package page."
            exit 1
          fi
          head11=$(printf '%s' "$AUR_SSH_KEY" | head -c 11)
          if [ "$head11" = "-----BEGIN" ]; then
            pem=$(printf '%s' "$AUR_SSH_KEY")
          else
            pem=$(printf '%s' "$AUR_SSH_KEY" | base64 -d) || {
              echo "::error::AUR_SSH_KEY is not PEM and is not valid base64."
              exit 1
            }
          fi
          first=$(printf '%s' "$pem" | head -n1)
          case "$first" in
            "-----BEGIN OPENSSH PRIVATE KEY-----") ;;
            "-----BEGIN RSA PRIVATE KEY-----") ;;
            "-----BEGIN EC PRIVATE KEY-----") ;;
            "-----BEGIN PRIVATE KEY-----") ;;
            *)
              echo "::error::AUR_SSH_KEY (after base64 decode, if used) does not start with a PEM private-key header."
              exit 1
              ;;
          esac
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}

      - name: Set up SSH for AUR
        run: |
          install -m 700 -d "${HOME}/.ssh"
          ssh-keyscan -t ed25519,rsa -H aur.archlinux.org >> "${HOME}/.ssh/known_hosts"
          chmod 644 "${HOME}/.ssh/known_hosts"
          head11=$(printf '%s' "$AUR_SSH_KEY" | head -c 11)
          if [ "$head11" = "-----BEGIN" ]; then
            printf '%s' "$AUR_SSH_KEY" > "${HOME}/.ssh/aur_key"
          else
            printf '%s' "$AUR_SSH_KEY" | base64 -d > "${HOME}/.ssh/aur_key"
          fi
          chmod 600 "${HOME}/.ssh/aur_key"
          # Use $HOME in the file, not ~/. OpenSSH expands ~ from passwd (e.g. /root) while
          # GHA container sets HOME=/github/home, so literal ~ would miss our known_hosts.
          {
            echo 'Host aur.archlinux.org'
            echo "  IdentityFile ${HOME}/.ssh/aur_key"
            echo "  UserKnownHostsFile ${HOME}/.ssh/known_hosts"
            echo '  StrictHostKeyChecking yes'
          } > "${HOME}/.ssh/config"
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}

      - name: Non-root user for makepkg
        run: |
          # makepkg refuses to run as root (Arch); run the update script as builder.
          if ! id builder >/dev/null 2>&1; then
            useradd -m -s /bin/bash builder
          fi
          chown -R builder:builder "${HOME}" "${GITHUB_WORKSPACE}"

      - name: Run update script
        run: |
          export PATH="${HOME}/.bun/bin:${PATH}"
          # Bun/git subprocesses may not see the same HOME as the shell; force SSH options.
          export GIT_SSH_COMMAND="ssh -i ${HOME}/.ssh/aur_key -o UserKnownHostsFile=${HOME}/.ssh/known_hosts -o StrictHostKeyChecking=yes"
          run_cmd="bun run update-aur.ts"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force }}" = "true" ]; then
            run_cmd="$run_cmd --force"
          fi
          if [ "${{ env.PUSH_TO_AUR }}" = "true" ]; then
            runuser -u builder -- env HOME="${HOME}" PATH="${PATH}" GIT_SSH_COMMAND="${GIT_SSH_COMMAND}" \
              bash -lc "cd \"${GITHUB_WORKSPACE}\" && $run_cmd"
          else
            echo "Dry run (set workflow input push=true to push to AUR)"
            runuser -u builder -- env HOME="${HOME}" PATH="${PATH}" GIT_SSH_COMMAND="${GIT_SSH_COMMAND}" \
              bash -lc "cd \"${GITHUB_WORKSPACE}\" && DRY_RUN=1 $run_cmd"
          fi
